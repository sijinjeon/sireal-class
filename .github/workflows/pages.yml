name: Deploy slides to GitHub Pages

on:
  push:
    branches:
      - claude/hackathon-collaboration-notes-9ry1s8
    paths:
      - '260623_성균관대_해커톤_협업_강의/Slider/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 260623_성균관대_해커톤_협업_강의/Slider/package-lock.json

      - name: Install & build slides
        working-directory: 260623_성균관대_해커톤_협업_강의/Slider
        run: |
          npm ci
          npm run build:all

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
